name: gwell_iot_plugin
description: Flutter plugin for Gwell IoT SDK (C2C mode) - camera live view, playback, device management.
version: 1.0.0

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.foursgen.connect
        pluginClass: GwellIotPlugin
